# HAnswer backend configuration — copy to config.toml and fill in.
# config.toml is gitignored; this example is safe to commit.

[gemini]
# API key is read from the $GEMINI_API_KEY environment variable.
# Do NOT put the key here — set it in your shell or CI secrets instead.
# Model per task. Override as needed when new Gemini versions ship.
model_parser   = "gemini-3.1-pro-preview" # multimodal, image -> ParsedQuestion
model_solver   = "gemini-3.1-pro-preview" # text, ParsedQuestion -> AnswerPackage
model_vizcoder = "gemini-3.1-pro-preview" # text, AnswerPackage -> visualizations[]
# Gemini dense-embedding model.
# Supported in this repo:
#   - "gemini-embedding-2-preview" via google-genai path (recommended, multimodal)
#   - "gemini-embedding-001"       via google-genai path
#   - "text-embedding-004"         via legacy google-generativeai path
model_embed    = "gemini-embedding-2-preview"
embed_dim      = 1536  # MRL prefix; 1536 ≈ 50% storage of 3072, negligible recall delta

[postgres]
dsn = "postgresql+asyncpg://jianbo@localhost:5432/jianbo"

[milvus]
host = "localhost"
port = 19530
database = "default"
# Auto-create the dense + sparse collections on FastAPI startup if
# missing. Set to false if you provision Milvus schemas out-of-band.
auto_bootstrap = true
# PostgreSQL is the source of truth in this repo, so startup may
# drop+recreate dense collections after a dim change and then rebuild
# Milvus from PostgreSQL automatically.
recreate_dense_on_dim_mismatch = true
auto_reindex_on_bootstrap_change = true

[server]
host = "127.0.0.1"
port = 8787
# CORS origins allowed for the Next.js dev server.
cors_origins = ["http://localhost:3333"]

[storage]
image_dir = "./data/images"

[llm]
# Retry & repair loop knobs (§4 non-functional requirements).
max_retries = 2
max_repair_attempts = 2
request_timeout_s = 60
parser_timeout_s = 120
solver_timeout_s = 300
vizcoder_timeout_s = 240
dialog_timeout_s = 90
embed_timeout_s = 60
stream_recovery_timeout_s = 300
stream_solver_json = true
stream_vizcoder_json = true

[retrieval]
# M5 multi-route retrieval with RRF fusion (§3.4).
# Fast remote mode:
#   embedder="gemini" + model_embed="gemini-embedding-2-preview" + sparse_encoder="bm25"
# Strongest local mixed-language recall:
#   embedder="bge-m3" + sparse_encoder="bge-m3"
# and install the optional extra: `pip install -e .[retrieval]`.
embedder                  = "gemini"        # "gemini" | "bge-m3"
sparse_encoder            = "bm25"          # "bm25" | "bge-m3"
multi_route               = true
rrf_k                     = 60
route_weights_dense       = 1.0
route_weights_sparse      = 1.0
route_weights_structural  = 1.0
bge_m3_model              = "BAAI/bge-m3"
bge_m3_device             = "cpu"
bge_m3_dense_dim          = 1024
wide_k_multiplier         = 3

[dialog]
# Multi-turn tutoring memory (§3.7).
model_chat                = "gemini-3.1-pro-preview"
recent_messages           = 10
max_question_context_chars = 12000
max_summary_chars         = 3000
max_key_facts             = 12
max_open_questions        = 8
